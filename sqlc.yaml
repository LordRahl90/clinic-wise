version: "2"
sql:
  - engine: "mysql"
    schema: "db/migrations"
    queries: "db/queries"
    gen:
      go:
        package: "repositories"
        out: "db/repositories"

overrides:
  go:
    overrides:
      - column: "*.id"
        go_type:
          import: "github.com/oklog/ulid/v2"
          type: "ULID"
plugins: [ ]
rules: [ ]
options: { }
